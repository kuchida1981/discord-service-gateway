services:
  app:
    build: .
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    ports:
      - "8000:8000"

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000 --url=${NGROK_DOMAIN}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - app
    ports:
      - "4040:4040"
